name: Deploy to Ubuntu

# Se ejecuta cuando se sube un commit a la rama main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy → Ubuntu
    runs-on: ubuntu-latest

    steps:
      # ── 1. Conectar por SSH y desplegar ───────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.BOT_DIR }}

            echo "→ Pulling latest changes..."
            git pull origin main

            echo "→ Installing / updating dependencies..."
            .venv/bin/pip install -r requirements.txt --quiet

            echo "→ Restarting service..."
            sudo systemctl restart discord-bot

            echo "→ Checking service status..."
            sudo systemctl is-active discord-bot

      # ── 2. Notificación de resultado ──────────────────
      - name: Deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy completado correctamente."
          else
            echo "❌ El deploy falló. Revisa los logs anteriores."
            exit 1
          fi
